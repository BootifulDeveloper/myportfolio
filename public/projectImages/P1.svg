<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">P1 project preview</title>
  <desc id="desc">Stylized portfolio preview card for P1.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcc33"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="640" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="520" cy="80" r="96" fill="#fff" opacity="0.12"/>
  <circle cx="82" cy="340" r="120" fill="#fff" opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="92" y="86" width="456" height="248" rx="28" fill="#101010" opacity="0.9"/>
    <rect x="124" y="126" width="216" height="18" rx="9" fill="#fff" opacity="0.18"/>
    <rect x="124" y="164" width="390" height="12" rx="6" fill="#fff" opacity="0.12"/>
    <rect x="124" y="190" width="332" height="12" rx="6" fill="#fff" opacity="0.12"/>
    <rect x="124" y="242" width="112" height="44" rx="22" fill="#ffcc33"/>
    <text x="180" y="270" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">F1</text>
  </g>
  <text x="320" y="380" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="700" fill="#fff">P1</text>
</svg>
